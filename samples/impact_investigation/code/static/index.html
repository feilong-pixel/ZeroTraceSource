<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>ZeroTraceSource Sample</title>
  </head>
  <body>
    <main>
      <section id="safety">
        <h1 data-i18n="main.safetyStrategy">Safety Strategy</h1>
        <p data-field="safety_strategy">安全方針を変更した場合、画面表示とDB登録を確認する。</p>
        <button data-action="applySafetyStrategy">安全方針を適用</button>
      </section>

      <section id="archive">
        <h2 data-i18n="main.archiveFlag">Archive Flag</h2>
        <p data-field="archive_flag">archiveFlag が有効な場合、一覧画面では非表示にする。</p>
      </section>
    </main>
  </body>
</html>
